<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Registration Form</title>
    <link rel="icon" href="https://img.icons8.com/?size=100&id=46573&format=png&color=000000">
  </head>
  <style>
    body {
      background-color: darkseagreen;
      color: black;
      font-family: sans-serif;
    }
    h2 {
      color: brown;
    }
  </style>
  <body>
    <fieldset>
      <legend><h2>Personal Details</h2></legend>
      <form action="">
        <table>
          <tr>
            <td><label for="Fname">First Name</label></td>
            <td>
              <input
                name="Fname"
                required
                id="Fname"
                type="text"
                placeholder="EX: Madhu"
              />
            </td>
          </tr>
          <tr>
            <td><label for="Sname">Sur Name</label></td>
            <td>
              <input name="Sname" id="Sname" type="text" placeholder="EX: E" />
            </td>
          </tr>
          <tr>
            <td><label for="mobile">Moile Number</label></td>
            <td>
              <input
                name="mobile"
                required
                id="mobile"
                type="tel"
                placeholder="EX: 678-985-8976"
              />
            </td>
          </tr>
          <tr>
            <td><label for="email">Email</label></td>
            <td>
              <input
                name="email"
                required
                id="email"
                type="email"
                placeholder="EX: example@gmail.com"
              />
            </td>
          </tr>
          <tr>
            <td><label for="password">Password</label></td>
            <td>
              <input
                name="password"
                required
                id="password"
                type="password"
                placeholder="Min 8 characters"
              />
            </td>
          </tr>
          <tr>
            <td><label for="Cpassword">Confirm Password</label></td>
            <td>
              <input
                name="Cpassword"
                required
                id="Cpassword"
                type="password"
                placeholder="Re-enter password"
              />
            </td>
          </tr>
          <tr>
            <td><label for="date">Date of Birth</label></td>
            <td><input name="date" required id="date" type="date" /></td>
          </tr>
          <tr>
            <td><label for="age">Age</label></td>
            <td>
              <input
                name="age"
                required
                id="age"
                type="number"
                min="18"
                max="65"
                placeholder="18-65"
              />
            </td>
          </tr>
          <tr>
            <td><label for="gender">Gender</label></td>
            <td>
              <input name="gender" required id="gender" value="M" type="radio" /><label
                for=""
                >Male</label
              >
              <input name="gender" required id="gender" value="F" type="radio" /><label
                for=""
                >Female</label
              >
              <input name="gender" required id="gender" value="O" type="radio" /><label
                for=""
                >Others</label
              >
            </td>
          </tr>
          <tr>
            <td><label for="Country">Select Country</label></td>
            <td>
              <select name="country" required id="country">
                <option value="--Select Country--">--Select Country--</option>
                <option value="India">India</option>
                <option value="Uk">Uk</option>
                <option value="Japan">Japan</option>
              </select>
            </td>
          </tr>
          <tr>
            <td><label for="">Upload Picture</label></td>
            <td>
              <input required type="file" />
            </td>
          </tr>
        </table>
        </fieldset>
        <fieldset>
        <legend><h2>Course details</h2></legend>
        <table>
          <tr>
            <td><label for="course">Select Course*</label></td>
            <td>
              <select name="course" required id="course">
                <option value="--Select--">--Select--</option>
                <option value="Java Full Stack Development">
                  Java Full Stack Development
                </option>
                <option value="Python Full Stack Development">
                  Python Full Stack Development
                </option>
                <option value="Data Analytics">Data Analytics</option>
              </select>
            </td>
          </tr>
          <tr>
            <td><label for="Delivery">Delivery Mode*</label></td>
            <td>
              <input
                name="Delivery"
                required
                id="Delivery"
                type="radio"
                value="On"
              /><label for="">Online</label>
              <input
                name="Delivery"
                required
                id="Delivery"
                type="radio"
                value="Of"
              /><label for="">Offline</label>
            </td>
          </tr>
          <tr>
            <td><label for="">Institute Name</label></td>
            <td><input type="text" readonly disabled value="Tap Academy" /></td>
          </tr>
          <tr>
            <td><label for="">Comments</label></td>
            <td>
              <input
                type="text"
                name="Comments"
                required
                id="Comments"
                placeholder="Any additional comments or questions...."
              />
            </td>
          </tr>

          <tr>
            <td><button type="reset">Clear Form</button></td>
          </tr>
          <tr>
            <td>
              <button type="submit">Submit Registration</button>
            </td>
          </tr>
        </table>
      </form>
    </fieldset>
  </body>
</html>
